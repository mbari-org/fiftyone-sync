# Example: per-project MongoDB URI and FiftyOne app port mapping.
# Set FIFTYONE_SYNC_CONFIG_PATH to this file path.
#
# Single MongoDB for project ObjectDetection (legacy single VSS project):
projects:
  ObjectDetection:
    vss_project: "testproject"
    databases:
      - uri: "mongodb://localhost:27017"
        port: 5151
